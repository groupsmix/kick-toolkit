name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-frontend:
    name: Frontend CI
    uses: groupsmix/shared-workflows/.github/workflows/ci.yml@main
    with:
      language: node
      node-version: "20"
      package-manager: npm
      working-directory: kick-frontend
      install-command: "npm ci"
      lint-command: "npm run lint"
      test-command: "echo 'No tests configured'"

  ci-backend:
    name: Backend CI
    uses: groupsmix/shared-workflows/.github/workflows/ci.yml@main
    with:
      language: python
      python-version: "3.12"
      package-manager: poetry
      working-directory: kick-backend
      install-command: "poetry install --no-interaction"
      lint-command: "pip install ruff && ruff check app/"
      test-command: "poetry run pytest tests/ -v --tb=short"

  quality-frontend:
    name: Frontend Code Quality
    uses: groupsmix/shared-workflows/.github/workflows/code-quality.yml@main
    with:
      language: node
      node-version: "20"
      package-manager: npm
      working-directory: kick-frontend
      install-command: "npm ci"
      run-formatter: false
      run-typecheck: true
      typecheck-command: "npx tsc --noEmit"
      run-coverage: false

  quality-backend:
    name: Backend Code Quality
    uses: groupsmix/shared-workflows/.github/workflows/code-quality.yml@main
    with:
      language: python
      python-version: "3.12"
      package-manager: poetry
      working-directory: kick-backend
      install-command: "pip install poetry && poetry config virtualenvs.in-project true && poetry install --no-interaction"
      run-formatter: false
      run-typecheck: true
      typecheck-command: "poetry run mypy app/ --ignore-missing-imports"
      run-coverage: false

  build-frontend:
    name: Frontend Build
    needs: [ci-frontend, quality-frontend]
    uses: groupsmix/shared-workflows/.github/workflows/build.yml@main
    with:
      language: node
      node-version: "20"
      package-manager: npm
      working-directory: kick-frontend
      install-command: "npm ci"
      build-command: "npm run build"
